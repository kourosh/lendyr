spec_version: v1
kind: knowledge_base
name: lendyr_branches
description: |
  Lendyr Bank branch locations across California. Contains branch names, street
  addresses, cities, ZIP codes, and GPS coordinates. Use this to answer questions
  about branch locations, find branches near a city, or retrieve branch details.
documents:
  - lendyr_branches.csv
vector_index:
  embeddings_model_name: ibm/slate-125m-english-rtrvr-v2
  chunk_size: 400
  chunk_overlap: 50
  extraction_strategy: express
