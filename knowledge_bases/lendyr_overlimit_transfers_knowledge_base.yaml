spec_version: v1
kind: knowledge_base
name: lendyr_overlimit_transfers_knowledge_base
description: |-
  Lendyr Bank knowledge base for handling over-limit funds transfer requests escalated from the AI voice agent to a customer service representative.

  This knowledge base is based on SOP-CC-FT-042, "Handling Over-Limit Funds Transfer Requests," and is intended to support CSR and agent-assist workflows for high-value internal transfers and outbound transfer requests that exceed standard self-service or phone-channel limits.

  It covers:
  1. Standard daily transfer limits for internal transfers, ACH, domestic wires, and international wires
  2. CSR escalation and supervisor override thresholds
  3. Regulatory and compliance requirements including BSA, USA PATRIOT Act, FinCEN Travel Rule, OFAC, Regulation E, Regulation CC, and elder financial exploitation guidance
  4. Required step-up authentication methods and caller-supplied number restrictions
  5. Mandatory fraud and red-flag screening for large transfers
  6. Approved procedures for internal transfers, domestic wires, and international wires
  7. Decline, deferment, and alternative fulfillment options when a transfer cannot be released
  8. CRM documentation and retention requirements for audit and investigation support

  This document should be treated as the authoritative reference for customer service representatives assisting customers with over-limit transfer requests and related escalation handling.
vector_index:
  embeddings_model_name: ibm/slate-125m-english-rtrvr-v2
  chunk_size: 400
  chunk_overlap: 50
  extraction_strategy: standard
conversational_search_tool:
  language: en
  index_config: []
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
  supports_full_document: false
prioritize_built_in_index: true
representation: tool
