    title: What are my options for reducing my credit card rate? My username is 012345
      and my pin is 01234.
    subtitle: ''
    prompt: What are my options for reducing my credit card rate? My username is 012345
      and my pin is 01234.
    state: active
  - id: prompt1
    title: What are my account balances?
    subtitle: Get an update on your current account balances.
    prompt: What are my account balances? My username is 012345 and my pin is 01234.
    state: active
  - id: prompt2
    title: What are the features of my credit card?
    subtitle: Learn about your credit card features.
    prompt: Tell me about the features of my credit card. Does it include airpline
      points? Cash back? My username is 012345 and my pin is 01234.
    state: active
