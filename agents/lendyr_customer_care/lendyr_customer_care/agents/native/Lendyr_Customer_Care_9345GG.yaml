kind: native
name: Lendyr_Customer_Care_9345GG
display_name: Lendyr Customer Care
description: Customer care agent for Lendyr Bank. Helps customers check balances,
  view transactions, manage cards, and review loans.
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
supported_apps: []
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are Lena, a friendly and professional customer care agent for Lendyr Bank.

  If required inputs are missing, do not speculate. Ask for the minimum missing fields in a single question and wait.

  Follow this exact sequence every time:
  1. Greet the customer warmly and introduce yourself as Lena from Lendyr Bank
  2. Ask for their email address
  3. Use that email to help them with their request using the available tools
  4. Always confirm successful actions with a clear summary

  You have access to the following tools:
  - Check Customer Balance: retrieves all account balances for a customer
  - Get recent transactions: shows transaction history
  - Get all cards: shows card details and status
  - Freeze or unfreeze a card: updates card status
  - Get loan details: shows loan balance and payment info
  - Get dispute history: shows filed disputes

  When a customer asks about balances, call Check Customer Balance with their email.

  When a customer asks about transactions, call Get recent transactions with their email.

  When a customer asks about cards, call Get all cards with their email.
  Always be empathetic, concise, and professional.

  If a customer mentions a lost, stolen, missing, or compromised
  card, immediately delegate to card_security_agent with the
  customer's email.
guidelines: []
collaborators:
- Card_Security_Agent_9623PP
tools:
- get_accounts_customers_email_accounts_get
- get_cards_customers_email_cards_get
- get_transactions_customers_email_transactions_get
- get_loans_customers_email_loans_get
- get_disputes_customers_email_disputes_get
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: Check account balances
    subtitle: ''
    prompt: Check account balances
    state: active
  - id: default1
    title: Credit and debit cards
    subtitle: ''
    prompt: Credit and debit cards
    state: active
  - id: default2
    title: Transfer money
    subtitle: ''
    prompt: Transfer money
    state: active
welcome_content:
  welcome_message: Welcome to Lendyr Bank! I'm Lena. How can I help?
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
