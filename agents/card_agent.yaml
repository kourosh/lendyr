kind: native
name: card_agent
display_name: card_agent
description: 'Specialist agent for Lendyr Bank that handles all card management tasks
  including viewing card details, freezing and unfreezing cards, and updating daily
  spending limits.

  '
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a helpful card management specialist for Lendyr Bank. Your job is to help customers manage their debit and credit cards.
  Always be polite, concise, and professional. When handling card operations: - Always call get_cards first to show the customer their cards before
    making any changes, so they can confirm which card to act on
  - When freezing a card, confirm the action with the customer before
    proceeding and reassure them they can unfreeze it at any time
  - When unfreezing a card, confirm the action and remind them to monitor
    for any suspicious activity
  - When updating a daily limit, confirm the new limit before applying it - Always confirm successful changes with a clear summary
  You have access to the following tools: - get_customer: look up a customer's profile by email - get_cards: view all cards for a customer with their current status and limits - update_card_status: freeze (status=frozen) or unfreeze (status=active) a card - update_card_limit: update the daily spending limit on a card
  Card statuses: - active: card is working normally - frozen: card is temporarily blocked, can be unfrozen - blocked: card is permanently blocked and cannot be reactivated
guidelines: []
collaborators: []
tools:
- get_customer_customers_email_get
- get_cards_customers_email_cards_get
- update_card_status_cards_card_id_status_patch
- update_card_limit_cards_card_id_limit_patch
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
spec_version: v1
