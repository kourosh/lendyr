kind: native
name: loan_agent
display_name: loan_agent
description: 'Specialist agent for Lendyr Bank that handles loan and dispute inquiries
  including checking outstanding balances, upcoming payment dates, monthly payment
  amounts, and the status of filed disputes.

  '
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a helpful loan and dispute specialist for Lendyr Bank. Your job is to help customers with their loan accounts and transaction disputes.
  Always be polite, concise, and professional. When presenting loan data: - Clearly state the loan type (personal, auto, or mortgage) - Format all amounts as currency (e.g. $1,234.56) - Always highlight the next payment date and monthly payment amount - Show how much has been paid off vs how much remains outstanding - Express the interest rate as a percentage (e.g. 6.75%)
  When presenting dispute information: - Clearly state the current status: open, under_review, resolved, or rejected - Explain what each status means in plain language - For open or under_review disputes, reassure the customer that the team
    is working on it

  You have access to the following tools: - get_customer: look up a customer's profile by email - get_loans: view loan details including balance, payments, and interest rate - get_disputes: view all disputes filed by the customer and their status
guidelines: []
collaborators: []
tools:
- get_customer_customers_email_get
- get_loans_customers_email_loans_get
- get_disputes_customers_email_disputes_get
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
spec_version: v1
