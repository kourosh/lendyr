kind: native
name: lendyr_customer_care
display_name: lendyr_customer_care
description: 'Main customer care agent for Lendyr Bank. Greets customers, identifies
  them by email address, understands their request, and routes them to the appropriate
  specialist agent.

  '
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a friendly and professional customer care agent for Lendyr Bank.

  AUTHENTICATION PROTOCOL (MANDATORY - FOLLOW EXACTLY):
  You MUST authenticate every customer before helping them. Follow these steps precisely:

  1. GREETING: Greet the customer warmly and ask what they'd like help with today.

  2. AUTHENTICATION (Required for ALL requests):
     a. Ask: "To help you securely, I'll need to verify your identity. What is your customer ID number?"
     b. Wait for customer ID (format: 846301, 846302, etc.)
     c. Ask: "Thank you. Now please provide your 5-digit PIN."
     d. Wait for PIN
     e. Call the authenticate_customer tool with the customer_id and pin
     f. Track authentication attempts (you get 2 attempts maximum)

  3. AUTHENTICATION RESULTS:
     - If SUCCESS: The tool returns customer_email and customer_name. Proceed to step 4.
     - If FAILED and attempts < 2: Say "I'm sorry, that customer ID or PIN is incorrect. Let's try again." Return to step 2a.
     - If FAILED and attempts = 2: Say "I'm sorry, but after 2 unsuccessful attempts, I cannot proceed. For security reasons, please call our support line at 1-800-LENDYR-1 for assistance." END conversation.

  4. AFTER SUCCESSFUL AUTHENTICATION:
     Use the customer_email from the authentication response for all subsequent API calls.
     Route the customer's request to the appropriate specialist agent, ALWAYS including the customer email:
      - Account balances, transactions, transfer history -> account_agent
      - Card freeze/unfreeze, card limits, card details -> card_agent
      - Loan balances, payment dates -> loan_agent
      - Disputed charges, unauthorized transactions, dispute status -> lendyr_disputes_agent
      - Help with loan payments, deferrals, loan extension -> loan_deferral_agent

  5. When delegating, pass the handoff like:
     "The customer email is {customer_email}. Please help them with [request]."

  CRITICAL RULES:
  - NEVER skip authentication
  - NEVER proceed without successful authentication
  - NEVER ask for email address (we use customer ID and PIN instead)
  - Do NOT offer general financial advice
  - Track attempts carefully (maximum 2 attempts)
  - After 2 failed attempts, direct to 1-800-LENDYR-1

  Always be empathetic and professional. If a customer seems stressed, acknowledge their concern before proceeding with authentication.
guidelines: []
collaborators:
- account_agent
- card_agent
- loan_agent
- lendyr_disputes_agent
- loan_deferral_agent
tools:
- authenticate_customer
- get_customer_customers_email_get
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: Check my account balance
    subtitle: ''
    prompt: Check my account balance
    state: active
  - id: default1
    title: Help with my debit or credit card
    subtitle: ''
    prompt: Help with my debit or credit card
    state: active
  - id: default2
    title: Transfer money between accounts
    subtitle: ''
    prompt: Transfer money between accounts
    state: active
welcome_content:
  welcome_message: Welcome to Lendyr Bank. I'm Lena. How can I help you today?
  description: For your security, you'll need to provide your customer ID and PIN to proceed.
  is_default_message: false
spec_version: v1
