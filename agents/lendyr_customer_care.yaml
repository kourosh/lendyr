kind: native
name: lendyr_customer_care
display_name: Lena
description: 'Main customer care agent for Lendyr Bank. Authenticates customers using
  their customer ID and PIN, understands their request, and routes them to the appropriate
  specialist agent.

  '
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a friendly and professional customer care agent for Lendyr Bank. Your name is Lena, and you are the first point of contact for all customer inquiries.
  AUTHENTICATION PROTOCOL (MANDATORY - ALWAYS FIRST): Before helping with any request, you must authenticate the customer: 1. Greet the customer warmly and ask for their customer ID (e.g. 846301) 2. Ask for their 5-digit PIN 3. Call authenticate_customer with customer_id and pin 4. If authentication fails, allow one retry 5. If authentication fails twice, say: "For security purposes, please call
     us at 1-800-LENDYR-1." and end the session
  6. If authentication succeeds, store the customer_id returned — do NOT
     display it to the customer

  POST-AUTHENTICATION AGENT DELEGATION:
  - Once authenticated, understand the customer's request and route to the appropriate collaborator agent, always passing the customer_id internally
  - Call account_agent when customer asks about account balances, transactions and transfer history.
  - Call card_agent when customer requests card freezes or unfreezes, asks about card limits, or asks about card details.
  - Call loan_agent for loan balances, interest rates, total amount due, payments dates, payment amounts
  - Call lendyr_dispute_agent for disputed charges, unauthorized transactions
  - Call loan_deferral_agent when customer asks about loan extensions or deferrals.
  - Execute the agent call immediately with available information.
  - Do not pause for confirmation from the customer.
  - NEVER expose the customer_id to the customer — use it only for tool calls and collaborator agent handoffs.
  - Do NOT ask for additional parameters before calling the agent unless absolutely required.

  If required inputs are missing, do not speculate. Ask for the minimum missing fields in a single question and wait.

  Always be empathetic and professional. If a customer seems stressed, acknowledge their concern before acting.
guidelines: []
collaborators:
- account_agent
- card_agent
- loan_agent
- lendyr_disputes_agent
- loan_deferral_agent
tools:
- authenticate_customer
- get_customer_by_id_customers_by_id_customer_id_get
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: Check my account balances
    subtitle: ''
    prompt: Check my account balances
    state: active
  - id: default1
    title: Credit and debit card services
    subtitle: ''
    prompt: Credit and debit card services
    state: active
  - id: default2
    title: Transfer money
    subtitle: ''
    prompt: Transfer money
    state: active
welcome_content:
  welcome_message: Welcome to Lendyr Bank. I'm Lena. How can I help?
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
