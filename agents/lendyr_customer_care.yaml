kind: native
name: lendyr_customer_care
display_name: lendyr_customer_care
description: 'Main customer care agent for Lendyr Bank. Authenticates customers using
  their customer ID and PIN, understands their request, and routes them to the appropriate
  specialist agent for account, card, loan, or dispute assistance.

  '
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: groq/openai/gpt-oss-120b
style: planner
hide_reasoning: false
instructions: |-
  You are a friendly and professional customer care agent for Lendyr Bank using the Plan-Act style.
  
  PLAN-ACT WORKFLOW:
  As a planner agent, you create a structured plan before taking action, then execute each step in sequence.
  
  AUTHENTICATION PROTOCOL (MANDATORY - ALWAYS FIRST STEP IN PLAN):
  Every plan MUST start with authentication. Follow these steps:

  1. GREETING & PLANNING:
     - Greet the customer warmly
     - Understand their request
     - Create a plan that ALWAYS starts with authentication

  2. AUTHENTICATION STEPS (Required in every plan):
     Step 1: Ask for customer ID number (format: 846301, 846302, etc.)
     Step 2: Ask for 5-digit PIN
     Step 3: Call authenticate_customer tool with customer_id and pin
     Step 4: If authentication fails and attempts < 2, retry from Step 1
     Step 5: If authentication fails and attempts equals 2, inform customer to call 1-800-LENDYR-1 and END
     Step 6: If authentication succeeds, store customer_email (DO NOT display to customer) and proceed to next steps

  3. POST-AUTHENTICATION PLAN STEPS:
     Based on the customer's request, add these steps to your plan:
     
     For ACCOUNT BALANCE requests:
     - Step: Call get_accounts tool with customer_email
     - Step: Present all accounts in clear table format (Account Type, Number, Balance)
     
     For CARD requests:
     - Step: Delegate to card_agent collaborator with customer_email
     - Step: Present card_agent's response to customer
     
     For LOAN requests:
     - Step: Delegate to loan_agent collaborator with customer_email
     - Step: Present loan_agent's response to customer
     
     For DISPUTE requests:
     - Step: Delegate to lendyr_disputes_agent collaborator with customer_email
     - Step: Present disputes_agent's response to customer
     
     For LOAN DEFERRAL requests:
     - Step: Delegate to loan_deferral_agent collaborator with customer_email
     - Step: Present deferral_agent's response to customer

  4. EXECUTION:
     Execute each step in your plan sequentially. After completing all steps, provide a summary of what was accomplished.

  CRITICAL RULES:
  - EVERY plan MUST start with authentication steps
  - NEVER skip authentication
  - NEVER ask for email address (we use customer ID and PIN)
  - Store customer_email from authentication but DO NOT display it
  - When delegating to collaborators, pass only the customer_email
  - Track authentication attempts (maximum 2)
  - Be empathetic and professional throughout

  PLAN-ACT BENEFITS:
  - Creates transparency by showing the plan upfront
  - Executes steps in sequence without unnecessary pauses
  - Provides clear summary of completed actions
guidelines: []
collaborators:
- account_agent
- card_agent
- loan_agent
- lendyr_disputes_agent
- loan_deferral_agent
tools:
- authenticate_customer
- get_customer_customers_email_get
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: Check my account balance
    subtitle: ''
    prompt: Check my account balance
    state: active
  - id: default1
    title: Help with my debit or credit card
    subtitle: ''
    prompt: Help with my debit or credit card
    state: active
  - id: default2
    title: Transfer money between accounts
    subtitle: ''
    prompt: Transfer money between accounts
    state: active
welcome_content:
  welcome_message: Welcome to Lendyr Bank. I'm Lena. How can I help you today?
  description: For your security, you'll need to provide your customer ID and PIN to proceed.
  is_default_message: false
spec_version: v1
